<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Gratis Mat NMBU</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #2e7d32;
      --green-dark:  #1b5e20;
      --green-pale:  #e8f5e9;
      --green-muted: #c8e6c9;
      --red:         #c62828;
      --red-pale:    #ffebee;
      --text:        #1a1a1a;
      --text-muted:  #666;
      --border:      #dde8dd;
      --radius:      12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f8f5;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--green);
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    #logout-btn {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 8px;
      padding: .4rem .9rem;
      cursor: pointer;
      font-size: .85rem;
      display: none;
    }
    #logout-btn:hover { background: rgba(255,255,255,.25); }

    main { max-width: 800px; margin: 0 auto; padding: 1.5rem; }

    /* Login */
    #login-section {
      max-width: 360px;
      margin: 3rem auto;
      background: #fff;
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    #login-section h2 { margin-bottom: 1.5rem; color: var(--green-dark); }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .3rem; }
    .field input {
      width: 100%;
      padding: .6rem .8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
    }
    .field input:focus { outline: 2px solid var(--green); border-color: transparent; }

    .btn-green {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
    }
    .btn-green:hover { background: var(--green-dark); }

    .error-msg { color: var(--red); font-size: .85rem; margin-top: .75rem; }

    /* Admin content */
    #admin-section { display: none; }

    .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0; }

    .tab-btn {
      background: none;
      border: none;
      padding: .6rem 1.2rem;
      font-size: .95rem;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      border-radius: 4px 4px 0 0;
      font-weight: 500;
    }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .badge {
      display: inline-block;
      background: var(--red);
      color: #fff;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 700;
      padding: .1rem .45rem;
      margin-left: .3rem;
      vertical-align: middle;
    }

    /* Event cards */
    .event-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      border-left: 4px solid var(--green);
    }

    .event-card.pending { border-left-color: #f9a825; }

    .event-card h3 { font-size: 1rem; margin-bottom: .3rem; }

    .event-meta {
      font-size: .82rem;
      color: var(--text-muted);
      margin-bottom: .5rem;
      display: flex;
      flex-wrap: wrap;
      gap: .4rem .9rem;
    }

    .event-desc { font-size: .85rem; color: #444; margin-bottom: .7rem; }

    .card-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

    .btn-approve {
      background: var(--green-pale);
      color: var(--green-dark);
      border: 1px solid var(--green-muted);
      border-radius: 8px;
      padding: .4rem .9rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-approve:hover { background: var(--green-muted); }

    .btn-reject, .btn-delete {
      background: var(--red-pale);
      color: var(--red);
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: .4rem .9rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-reject:hover, .btn-delete:hover { background: #ffcdd2; }

    .empty { color: var(--text-muted); font-size: .9rem; padding: 1rem 0; }
  </style>
</head>
<body>

<header>
  <h1>🌿 Gratis Mat NMBU — Admin</h1>
  <button id="logout-btn">Logg ut</button>
</header>

<main>

  <!-- Innlogging -->
  <section id="login-section">
    <h2>Logg inn</h2>
    <form id="login-form">
      <div class="field">
        <label for="username">Brukernavn</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Passord</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <div id="login-error" class="error-msg"></div>
      <button type="submit" class="btn-green">Logg inn</button>
    </form>
  </section>

  <!-- Admin-panel -->
  <section id="admin-section">
    <div class="tabs">
      <button class="tab-btn active" data-tab="pending">
        Venter på godkjenning <span id="pending-badge" class="badge" style="display:none"></span>
      </button>
      <button class="tab-btn" data-tab="published">Publiserte arrangementer</button>
    </div>

    <div id="tab-pending" class="tab-panel active">
      <div id="pending-list"></div>
    </div>

    <div id="tab-published" class="tab-panel">
      <div id="published-list"></div>
    </div>
  </section>

</main>

<script src="admin.js"></script>
</body>
</html>
